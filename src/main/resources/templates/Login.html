<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CareerCompass AI</title>

  <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to right,#0f172a,#1e3a8a);
    }

    .login-box{
        background:white;
        padding:40px;
        width:400px;
        border-radius:12px;
        box-shadow:0px 0px 20px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#1e3a8a;
    }

    input{
        width:100%;
        padding:12px;
        margin:12px 0;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:6px;
        font-size:18px;
        cursor:pointer;
        margin-top:15px;
        transition:0.3s;
    }

    button:hover{
        background:#1d4ed8;
    }

    .bottom-text{
        text-align:center;
        margin-top:20px;
    }

    a{
        text-decoration:none;
        color:#2563eb;
    }

  </style>

</head>

<body>

<div class="login-box">

  <h1>User Login</h1>

  <form action="/login" method="post">

    <input type="email" name="email" placeholder="Enter Email" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>

  </form>

  <div class="bottom-text">

    Don’t have an account?
    <a href="/register">Register</a>

  </div>

</div>

</body>
</html>
