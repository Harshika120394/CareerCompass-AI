<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Quiz</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            margin:0;
            padding:0;
            color:white;
        }

        .container{
            width:70%;
            margin:40px auto;
            background: rgba(255,255,255,0.1);
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            color:#00d4ff;
            margin-bottom:30px;
        }

        .question-box{
            margin-bottom:30px;
            padding:20px;
            background: rgba(255,255,255,0.08);
            border-radius:10px;
        }

        h3{
            margin-bottom:15px;
            color:#00ffcc;
        }

        input[type="radio"]{
            margin:10px;
        }

        label{
            font-size:18px;
        }

        .submit-btn{
            display:block;
            margin:30px auto;
            padding:15px 35px;
            border:none;
            border-radius:10px;
            background:#00d4ff;
            color:black;
            font-size:20px;
            cursor:pointer;
            font-weight:bold;
        }

        .submit-btn:hover{
            background:#00ffcc;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Career Assessment Quiz</h1>

    <form action="/submitQuiz" method="post">

        <!-- Question 1 -->
        <div class="question-box">

            <h3>1. Which activity do you enjoy the most?</h3>

            <input type="radio" name="q1" value="coding" required>
            <label>Coding Applications</label><br>

            <input type="radio" name="q1" value="design">
            <label>Designing Graphics</label><br>

            <input type="radio" name="q1" value="analysis">
            <label>Analyzing Data</label><br>

        </div>

        <!-- Question 2 -->
        <div class="question-box">

            <h3>2. What is your strongest skill?</h3>

            <input type="radio" name="q2" value="problem" required>
            <label>Problem Solving</label><br>

            <input type="radio" name="q2" value="creative">
            <label>Creativity</label><br>

            <input type="radio" name="q2" value="logic">
            <label>Logical Thinking</label><br>

        </div>

        <!-- Question 3 -->
        <div class="question-box">

            <h3>3. Which subject interests you most?</h3>

            <input type="radio" name="q3" value="technology" required>
            <label>Technology</label><br>

            <input type="radio" name="q3" value="art">
            <label>Art & Design</label><br>

            <input type="radio" name="q3" value="statistics">
            <label>Statistics & Data</label><br>

        </div>

        <!-- Question 4 -->
        <div class="question-box">

            <h3>4. What would you like to create?</h3>

            <input type="radio" name="q4" value="apps" required>
            <label>Mobile Applications</label><br>

            <input type="radio" name="q4" value="ui">
            <label>User Interface Designs</label><br>

            <input type="radio" name="q4" value="reports">
            <label>Business Reports</label><br>

        </div>

        <!-- Question 5 -->
        <div class="question-box">

            <h3>5. Which career field excites you most?</h3>

            <input type="radio" name="q5" value="software" required>
            <label>Software Engineering</label><br>

            <input type="radio" name="q5" value="graphics">
            <label>Graphic Designing</label><br>

            <input type="radio" name="q5" value="analytics">
            <label>Data Analytics</label><br>

        </div>

        <button type="submit" class="submit-btn">
            Submit Quiz
        </button>
-+
    </form>

</div>

</body>
</html>
