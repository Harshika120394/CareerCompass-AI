<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CareerCompass AI</title>

  <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to right,#1d3557,#457b9d);
    }

    .container{
        background:white;
        padding:40px;
        width:400px;
        border-radius:10px;
        box-shadow:0px 0px 15px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#1d3557;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#0077b6;
        color:white;
        border:none;
        border-radius:5px;
        font-size:18px;
        cursor:pointer;
        margin-top:15px;
        transition:0.3s;
    }

    button:hover{
        background:#023e8a;
    }

    p{
        text-align:center;
        margin-top:20px;
    }

    a{
        color:#0077b6;
        text-decoration:none;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Create Account</h1>

  <form action="/register" method="post">

    <input type="text" name="fullname" placeholder="Enter Full Name" required>

    <input type="email" name="email" placeholder="Enter Email" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Register</button>

  </form>

  <p>
    Already have an account?
    <a href="/login">Login</a>
  </p>

</div>

</body>
</html>
