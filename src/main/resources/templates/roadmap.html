<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Career Roadmap</title>

  <style>

    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
        margin:0;
        padding:0;
        color:white;
    }

    .container{
        width:75%;
        margin:40px auto;
        background: rgba(255,255,255,0.1);
        padding:40px;
        border-radius:15px;
        box-shadow:0px 0px 20px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        color:#00d4ff;
        margin-bottom:30px;
    }

    .career-title{
        text-align:center;
        font-size:32px;
        color:#00ffcc;
        margin-bottom:25px;
    }

    .roadmap-box{
        background: rgba(255,255,255,0.08);
        padding:25px;
        border-radius:12px;
        margin-bottom:20px;
    }

    .step{
        padding:15px;
        margin:10px 0;
        background: rgba(255,255,255,0.05);
        border-left:5px solid #00d4ff;
        border-radius:8px;
        font-size:18px;
    }

    .btn{
        display:block;
        width:220px;
        margin:30px auto;
        text-align:center;
        padding:14px;
        background:#00d4ff;
        color:black;
        text-decoration:none;
        border-radius:10px;
        font-weight:bold;
    }

    .btn:hover{
        background:#00ffcc;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Learning Roadmap</h1>

  <div class="career-title" th:text="${career}"></div>

  <div class="roadmap-box">

    <div class="step" th:each="step : ${roadmap}">
      ➜ <span th:text="${step}"></span>
    </div>

  </div>

  <a href="/quiz" class="btn">Take Quiz Again</a>

</div>

</body>
</html>
